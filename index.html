<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayanggg 🥺❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe6ec,#ffd6e7);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    width:100%;
    padding:20px;
}

h1{
    color:#ff4d79;
    margin-bottom:40px;
    font-size:3rem;
}

.buttons{
    position:relative;
    width:100%;
    max-width:90vw;
    height:55vh;
    min-height:320px;
    margin:auto;
}

button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    user-select:none;
    transition:transform .2s ease;
}

/* YES BUTTON */
#yes{
    position:absolute;
    left:50%;
    top:40%;
    transform:translateX(-50%);
    transform-origin:center center;
    background:#4CAF50;
    color:white;
    padding:16px 40px;
    font-size:24px;
    z-index:10;
}

/* NO BUTTON */
#no{
    position:absolute;
    left:70%;
    top:40%;
    background:#ff4d4d;
    color:white;
    padding:16px 40px;
    font-size:24px;
    touch-action:none;
}

#result{
    margin-top:30px;
    font-size:2rem;
    color:#ff4d79;
    font-weight:bold;
}

.hearts{
    position:fixed;
    pointer-events:none;
    animation:floatUp 2s linear forwards;
    font-size:30px;
}

@keyframes floatUp{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-150px);
    }
}

@media(max-width:600px){

    h1{
        font-size:2rem;
    }

    #yes,
    #no{
        font-size:18px;
        padding:12px 24px;
    }

    #result{
        font-size:1.4rem;
    }
}
</style>

</head>
<body>

<div class="container">

```
<h1 id="question">
    Baikan yuk? 🥺❤️
</h1>

<div class="buttons">
    <button id="yes">
        Iyaa ayangg ❤️
    </button>

    <button id="no">
        Gamau 💔
    </button>
</div>

<div id="result"></div>
```

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const question = document.getElementById("question");
const result = document.getElementById("result");
const area = document.querySelector(".buttons");

let level = 0;

const messages = [
    "Sayangg, masih marah? gamau baikan kan? 🥺❤️",
    "Maafin aku yah? 😭",
    "Gamau maafin aku kah ini?? 🥺",
    "Huhu kan emang beneran ngelag sayangg? 🙏",
    "Baikan??",
    "Ga marahan lagi? 🍦",
    "Beneran?? 🍦🍦",
    "Huhuhu 😭",
    "Ayoo kita berbaikan❤️ ",
    "Udah ga keliatan itu tombolnya 😱",
    "Maafin akuuuuh ❤️"
];

function spawnHeart(){

    const heart = document.createElement("div");

    heart.className = "hearts";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random() * window.innerWidth + "px";

    heart.style.top =
        Math.random() * window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 2000);
}

function moveButton(){

    if(!document.body.contains(noBtn))
        return;

    const maxX =
        area.clientWidth - noBtn.offsetWidth;

    const maxY =
        area.clientHeight - noBtn.offsetHeight;

    noBtn.style.left =
        Math.random() * maxX + "px";

    noBtn.style.top =
        Math.random() * maxY + "px";

    level++;

    if(level < messages.length){
        question.textContent = messages[level];
    }

    /* YES GROWS */
    const maxScale =
        window.innerWidth < 600 ? 2.5 : 4;

    const yesScale =
        Math.min(
            maxScale,
            1 + (level * 0.25)
        );

    yesBtn.style.transform =
        `translateX(-50%) scale(${yesScale})`;

    /* NO SHRINKS */
    const noScale =
        Math.max(
            0.1,
            1 - (level * 0.08)
        );

    noBtn.style.transform =
        `scale(${noScale})`;

    if(level === 5){
        noBtn.textContent =
            "tiny no 💔";
    }

    if(level === 8){
        noBtn.textContent =
            "smol no 🥺";
    }

    if(level === 11){
        noBtn.textContent = ".";
    }

    if(level >= 13){
        noBtn.style.opacity = "0.4";
    }

    if(level >= 15){

        noBtn.remove();

        question.textContent =
            "The No button has chosen forgiveness ❤️";
    }

    spawnHeart();
}

/* DESKTOP */
noBtn.addEventListener(
    "mouseenter",
    moveButton
);

/* MOBILE */
noBtn.addEventListener(
    "touchstart",
    (e) => {
        e.preventDefault();
        moveButton();
    }
);

/* IMPOSSIBLE CLICK */
noBtn.addEventListener(
    "click",
    (e) => {
        e.preventDefault();
        moveButton();
    }
);

/* NO LONG PRESS MENU */
noBtn.addEventListener(
    "contextmenu",
    (e) => {
        e.preventDefault();
    }
);

/* RUN AWAY WHEN FINGER IS CLOSE */
function dodgeButton(x, y){

    if(!document.body.contains(noBtn))
        return;

    const rect =
        noBtn.getBoundingClientRect();

    const centerX =
        rect.left + rect.width / 2;

    const centerY =
        rect.top + rect.height / 2;

    const distance = Math.hypot(
        x - centerX,
        y - centerY
    );

    if(distance < 150){
        moveButton();
    }
}

document.addEventListener(
    "touchmove",
    (e) => {

        if(!document.body.contains(noBtn))
            return;

        const touch = e.touches[0];

        dodgeButton(
            touch.clientX,
            touch.clientY
        );

    },
    { passive:true }
);

/* YES CLICK */
yesBtn.addEventListener(
    "click",
    () => {

        document.querySelector(
            ".buttons"
        ).style.display = "none";

        question.innerHTML =
            "🎉 YAYYYYYY!! 🎉";

        result.innerHTML = `
            ❤️ Yeaaaay Makasih sayangg aku yang cantikk ❤️
            <br><br>
            Ilopyouuuuuuuuuu 🥰
            <br><br>
            💖💖💖
        `;

        for(let i=0;i<50;i++){
            setTimeout(
                spawnHeart,
                i*80
            );
        }
    }
);

</script>

</body>
</html>
